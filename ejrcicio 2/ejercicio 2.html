<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promedio de Notas</title>

    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #004080, #00aaff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .contenedor{
            background: white;
            width: 400px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        h1{
            text-align: center;
            color: #004080;
            margin-bottom: 25px;
        }

        label{
            font-weight: bold;
            display: block;
            margin-top: 10px;
            margin-bottom: 5px;
        }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }

        input:focus{
            outline: none;
            border-color: #00aaff;
        }

        button{
            width: 100%;
            padding: 15px;
            background: linear-gradient(to right, #004080, #0066cc);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }

        button:hover{
            transform: scale(1.03);
            background: linear-gradient(to right, #00264d, #004080);
        }

        .resultado{
            margin-top: 25px;
            text-align: center;
            background: #f4f4f4;
            padding: 20px;
            border-radius: 10px;
        }

        .resultado h2{
            color: #004080;
            margin-bottom: 10px;
        }

    </style>

</head>
<body>

    <div class="contenedor">

        <h1>Promedio de 5 Notas</h1>

        <label>Nota 1</label>
        <input type="number" id="n1" min="0" max="20">

        <label>Nota 2</label>
        <input type="number" id="n2" min="0" max="20">

        <label>Nota 3</label>
        <input type="number" id="n3" min="0" max="20">

        <label>Nota 4</label>
        <input type="number" id="n4" min="0" max="20">

        <label>Nota 5</label>
        <input type="number" id="n5" min="0" max="20">

        <button onclick="calcularPromedio()">
            Calcular Promedio
        </button>

        <div class="resultado">

            <h2 id="promedio">Promedio: </h2>

            <h2 id="estado">Estado: </h2>

        </div>

    </div>

    <script>

        function calcularPromedio(){

            let n1 = parseFloat(document.getElementById("n1").value);
            let n2 = parseFloat(document.getElementById("n2").value);
            let n3 = parseFloat(document.getElementById("n3").value);
            let n4 = parseFloat(document.getElementById("n4").value);
            let n5 = parseFloat(document.getElementById("n5").value);

            let promedio = (n1 + n2 + n3 + n4 + n5) / 5;

            let estado = "";

            if(promedio >= 18 && promedio <= 20){

                estado = "Excelente";

            }else if(promedio >= 14){

                estado = "Bueno";

            }else if(promedio >= 11){

                estado = "Regular";

            }else{

                estado = "Malo";
            }

            document.getElementById("promedio").innerHTML =
            "Promedio: " + promedio.toFixed(2);

            document.getElementById("estado").innerHTML =
            "Estado: " + estado;
        }

    </script>

</body>
</html>
